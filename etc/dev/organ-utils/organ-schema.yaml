type: object
properties:
  name:
    type: string
  asctb:
    type: string
    pattern: '\w+-v.+'
  uberon:
    type: string
    pattern: 'http://purl.obolibrary.org/obo/UBERON_\d+'
  uberon_short:
    type: string
    pattern: 'UBERON_\d+'
  description:
    type: string
  icon:
    type: string
  has_iu_component:
    type: boolean
  search:
    # Array may be empty.
    type: array
    items:
      type: string
required:
  - name
  - uberon
  - uberon_short
  - description
  - search
  # icon not required.
additionalProperties: false
