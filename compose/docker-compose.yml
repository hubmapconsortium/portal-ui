services:
  portal-ui:
    # Build from the repo-root Dockerfile (build context must be the repo root).
    # NODE_V / PYTHON_MINOR_V mirror etc/build/build.sh; export them first, e.g.:
    #   export NODE_V=$(perl -pne 's/v//' .nvmrc) \
    #          PYTHON_MINOR_V=$(perl -pne 's/\.\d+$//' .python-version)
    # and `docker login dhi.io` before building.
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        NODE_V: ${NODE_V:?export NODE_V (see etc/build/build.sh)}
        PYTHON_MINOR_V: ${PYTHON_MINOR_V:?export PYTHON_MINOR_V (see etc/build/build.sh)}
    volumes:
      - "../context/instance/app.conf:/app/instance/app.conf"
    ports:
      # Non-root gunicorn listens on 8080 inside the container.
      - "8080:8080"

  nginx:
    # In production, the NGINX reverse proxy is provided by the gateway.
    image: nginx:1.17.6
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf"
    ports:
      # Map port 5000 on localhost to 80 on the sidecar nginx container.
      - "5000:80"
